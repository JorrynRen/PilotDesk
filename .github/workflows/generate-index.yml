# 插件商店索引自动生成
# 当 server/market/plugins/ 目录下的插件文件发生变更时，
# 自动重新生成 index.json 索引文件并提交到仓库。
#
# 目录结构:
#   server/market/plugins/<plugin-id>/<version>/
#     ├── manifest.json     # 插件清单（version 字段从此读取）
#     ├── index.js          # 插件入口
#     └── icon.png          # 插件图标（可选）
#
# 索引文件位置: server/market/plugins/index.json

name: Generate Plugin Index

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.json
        run: |
          # 生成索引文件头
          echo '{"schemaVersion":"1.0","updatedAt":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'","plugins":[' > server/market/plugins/index.json

          first=true
          # 扫描 server/market/plugins/<plugin-id>/<version>/manifest.json
          for manifest in server/market/plugins/*/*/manifest.json; do
            [ ! -f "$manifest" ] && continue

            plugin_dir=$(dirname "$manifest")
            # 提取 plugin-id 和 version（从路径中获取，但 version 以 manifest.json 为准）
            rel_path="${plugin_dir#server/market/plugins/}"
            plugin_id=$(echo "$rel_path" | cut -d'/' -f1)
            dir_version=$(echo "$rel_path" | cut -d'/' -f2)

            # 读取 manifest.json 中的 version 字段
            manifest_version=$(jq -r '.version // empty' "$manifest")
            [ -z "$manifest_version" ] && manifest_version="$dir_version"

            # 计算目录大小
            size=$(du -sh "$plugin_dir" | cut -f1)

            # 构建插件信息 JSON（仅存储浏览/搜索所需字段，完整清单安装时从 baseUrl 读取）
            [ "$first" = true ] && first=false || echo ',' >> server/market/plugins/index.json

                          # 检测图标文件（支持 .png 或 .ico）
              icon_file=""
              for ext in png ico; do
                if [ -f "$plugin_dir/icon.$ext" ] || [ -f "$plugin_dir/favicon.$ext" ]; then
                  icon_file="icon.$ext"
                  [ -f "$plugin_dir/favicon.$ext" ] && icon_file="favicon.$ext"
                  break
                fi
              done
              # 无图标文件时留空（索引中 icon 字段为空字符串，前端自行处理）
              [ -z "$icon_file" ] && icon_file=""
              # 检测 README.md（可选）
              readme_url=""
              [ -f "$plugin_dir/README.md" ] && readme_url="https://raw.githubusercontent.com/JorrynRen/PilotDesk/main/server/market/plugins/$rel_path/README.md"

              jq -n --arg id "$plugin_id"               --arg name "$(jq -r '.name // empty' "$manifest")"               --arg version "$manifest_version"               --arg description "$(jq -r '.description // empty' "$manifest")"               --arg author "$(jq -r '.author // empty' "$manifest")"               --arg minAppVersion "$(jq -r '.minAppVersion // empty' "$manifest")"               --arg path "plugins/$rel_path"               --arg baseUrl "https://raw.githubusercontent.com/JorrynRen/PilotDesk/main/server/market/plugins/$rel_path"               --arg icon "$([ -n "$icon_file" ] && echo "https://raw.githubusercontent.com/JorrynRen/PilotDesk/main/server/market/plugins/$rel_path/$icon_file" || echo "")"               --arg size "$size"               --arg readme "$readme_url"               '{
                id: $id,
                name: $name,
                version: $version,
                description: $description,
                author: $author,
                minAppVersion: $minAppVersion,
                path: $path,
                baseUrl: $baseUrl,
                icon: $icon,
                size: $size,
                readme: $readme
              }' >> server/market/plugins/index.json
          done

          # 关闭 JSON 数组
          echo ']}' >> server/market/plugins/index.json

          echo "Index generated: $(wc -c < server/market/plugins/index.json) bytes"
          echo "Plugin count: $(jq '.plugins | length' server/market/plugins/index.json)"

      - name: Validate index.json
        run: |
          echo "Validating index.json..."
          if [ ! -f server/market/plugins/index.json ]; then
            echo "Error: index.json not generated"
            exit 1
          fi
          # 验证 JSON 格式
          if ! jq empty server/market/plugins/index.json 2>/dev/null; then
            echo "Error: index.json is not valid JSON"
            exit 1
          fi
          echo "Index file size: $(wc -c < server/market/plugins/index.json) bytes"
          echo "Plugin count: $(jq '.plugins | length' server/market/plugins/index.json)"

      - name: Commit and push if changed
        run: |
          git config --local user.email "ren.jorryn@gmail.com"
          git config --local user.name "jorryn"
          git add server/market/plugins/index.json
          if git diff --staged --quiet; then
            echo "No changes to index.json"
          else
            git commit -m "chore(plugin-market): auto-generate plugin index [skip ci]"
            git push
          fi
